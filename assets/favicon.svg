<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#2563EB"/>
  <!-- Mortarboard cap top -->
  <polygon points="16,7 28,12.5 16,18 4,12.5" fill="white"/>
  <!-- Cap board highlight -->
  <polygon points="16,7 28,12.5 16,18 4,12.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Tassel string -->
  <line x1="28" y1="12.5" x2="28" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="28" cy="19.5" r="1.5" fill="#93C5FD"/>
  <!-- Cap body (cylinder) -->
  <path d="M10,14.5 L10,20 Q16,23 22,20 L22,14.5" fill="#1D4ED8"/>
  <!-- Diploma scroll suggestion -->
  <rect x="13" y="20.5" width="6" height="4" rx="1" fill="white" opacity="0.9"/>
  <line x1="14.5" y1="22" x2="17.5" y2="22" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="14.5" y1="23.2" x2="17.5" y2="23.2" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>
</svg>
